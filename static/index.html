<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOLA AI — Sunset Bayou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #FFF4E6;
      color: #3A2417;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:          #FFF4E6;
      --bg2:         #FFFDF7;
      --bg3:         #FFFDF7;
      --panel:       #FBE6CF;
      --border:      #E9C9A6;
      --border2:     #D9A876;
      --text:        #3A2417;
      --text2:       #7A5236;
      --text3:       #A8845E;
      --accent:      #E25C3F;
      --accent-deep: #C44424;
      --accent-dim:  #FFE3CC;
      --accent-bdr:  #F4A57A;
      --accent-glow: rgba(226,92,63,0.18);
      --user-bg:     #FFD7BA;
      --user-bdr:    #F4A57A;
      --green:       #2A8C7B;
      --red:         #C44424;
      --blue:        #1F6F8B;
      --console-bg:  #F7E4C8;
    }

    /* ── Keyframes ──────────────────────────────────────────── */
    @keyframes blink  { 50% { opacity: 0; } }
    @keyframes bob    { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-4px) rotate(2deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Scrollbars ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(122,82,54,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(122,82,54,0.4); }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 28px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--bg2) 0%, var(--panel) 100%);
      border-bottom: 1.5px solid var(--border);
      position: relative; overflow: hidden;
    }
    .scatter {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.55;
    }
    .scatter img { position: absolute; }
    .logo-disc {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: var(--user-bg); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 var(--accent-deep);
      transform: rotate(-3deg);
    }
    .logo-disc img { animation: bob 2.4s ease-in-out infinite; display: block; }
    .header-text { display: flex; flex-direction: column; gap: 2px; position: relative; }
    .app-name {
      font-family: 'Caveat', cursive; font-weight: 700;
      font-size: 24px; letter-spacing: 0.01em; color: var(--text); line-height: 1.0;
    }
    .app-sub { font-size: 13px; color: var(--text3); letter-spacing: 0.02em; font-style: italic; }

    /* ── Body layout ────────────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }
    .chat { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ── Messages area ──────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto; padding: 32px 32px 16px;
      display: flex; flex-direction: column; gap: 22px;
    }

    /* ── Welcome ────────────────────────────────────────────── */
    .welcome { text-align: center; padding: 56px 24px; max-width: 540px; margin: 0 auto; }
    .welcome-icons { display: flex; justify-content: center; gap: 14px; margin-bottom: 18px; }
    .welcome-icons img { display: block; }
    .welcome-headline {
      font-family: 'Caveat', cursive; font-weight: 700;
      font-size: 32px; color: var(--text); line-height: 1.15; margin-bottom: 10px;
    }
    .welcome-sub { font-size: 15px; color: var(--text2); line-height: 1.6; }

    /* ── Message rows ───────────────────────────────────────── */
    .msg-wrap { animation: fadeIn 0.4s ease-out; }
    .msg-row { display: flex; align-items: flex-start; gap: 12px; }
    .msg-row.user { justify-content: flex-end; }

    .bubble { max-width: 580px; line-height: 1.65; font-size: 14.5px; }
    .bubble.user {
      padding: 12px 18px;
      background: var(--user-bg); border: 1.5px solid var(--user-bdr);
      border-radius: 20px 20px 6px 20px; color: var(--text);
      box-shadow: 0 2px 0 var(--user-bdr);
    }
    .bubble.assistant {
      padding: 13px 18px;
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 6px 20px 20px 20px; color: var(--text);
      box-shadow: 0 2px 0 var(--border);
    }

    .answer-text p              { margin: 5px 0; }
    .answer-text p:first-child  { margin-top: 0; }
    .answer-text p:last-child   { margin-bottom: 0; }
    .answer-text strong         { font-weight: 700; }
    .answer-text em             { font-style: italic; }

    .cursor {
      display: inline-block; width: 2px; height: 14px;
      background: var(--accent); vertical-align: middle; margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; margin-top: 1px;
      background: var(--accent-dim); border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar.streaming { animation: bob 1.4s ease-in-out infinite; }

    .countdown {
      font-size: 14px; color: var(--text3); margin-top: 6px;
      padding-left: 44px; font-style: italic;
      font-variant-numeric: tabular-nums;
      display: none;
    }
    .countdown.visible { display: block; }

    /* ── Business cards ─────────────────────────────────────── */
    .cards {
      display: flex; flex-direction: column; gap: 10px;
      max-width: 580px; padding-left: 44px; margin-top: 12px;
    }
    .card {
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 14px 16px;
      display: flex; gap: 12px;
      box-shadow: 0 3px 0 var(--border);
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--border);
    }
    .card-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--user-bg); border-radius: 12px;
      border: 1px solid var(--user-bdr);
      display: flex; align-items: center; justify-content: center;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-header-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 8px; margin-bottom: 3px;
    }
    .card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600; font-size: 16px; color: var(--text);
      letter-spacing: -0.01em;
      font-variation-settings: 'opsz' 144, 'SOFT' 50;
    }
    .card-price  { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; flex-shrink: 0; }
    .card-stars  { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.03em; }
    .card-quote  { font-size: 12.5px; color: var(--text2); font-style: italic; line-height: 1.55; }

    /* ── Input bar ──────────────────────────────────────────── */
    .input-bar {
      border-top: 1.5px solid var(--border); padding: 16px 28px;
      background: rgba(255,253,247,0.85); flex-shrink: 0;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .input-row { display: flex; gap: 12px; align-items: flex-end; }
    .input-wrap { flex: 1; }
    textarea {
      width: 100%; background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 16px; color: var(--text);
      font-family: inherit; font-size: 14px; resize: none; outline: none;
      line-height: 1.5; transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea::placeholder { color: var(--text3); }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .char-row { display: flex; justify-content: flex-end; margin-top: 4px; }
    .char-count { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }
    .char-count.warn { color: var(--red); }

    #send-btn {
      padding: 12px 22px; background: var(--accent);
      border: 2px solid var(--accent-deep); border-radius: 14px;
      font-size: 14.5px; font-weight: 700; font-family: inherit;
      color: #FFFFFF; cursor: pointer; flex-shrink: 0;
      margin-bottom: 22px; letter-spacing: 0.03em;
      box-shadow: 0 3px 0 var(--accent-deep);
      transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
    }
    #send-btn:hover:not(:disabled) { background: #F47B5C; }
    #send-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--accent-deep);
    }
    #send-btn:disabled {
      background: var(--border); border-color: var(--border);
      color: var(--text3); cursor: not-allowed; box-shadow: none;
    }

    /* ── Console panel ──────────────────────────────────────── */
    .console-panel {
      width: 288px; flex-shrink: 0; border-left: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--console-bg);
      background-image: radial-gradient(rgba(122,82,54,0.10) 1px, transparent 1px);
      background-size: 12px 12px;
    }
    .console-title {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .console-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--text3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .console-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .console-title-text {
      font-family: 'Caveat', cursive; font-weight: 700;
      font-size: 16px; color: var(--text2); letter-spacing: 0.01em;
    }
    #console {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
      font-size: 13.5px; line-height: 1.5;
    }
    .log { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 0.3s ease-out; }
    .log .bullet { flex-shrink: 0; width: 14px; text-align: center; color: var(--accent); font-size: 14px; padding-top: 1px; }
    .log .msg    { flex: 1; word-break: break-word; }
    .log .ts     { flex-shrink: 0; color: var(--text3); font-size: 11px; padding-top: 2px; opacity: 0.7; font-variant-numeric: tabular-nums; }
    .log.dim     { color: var(--text3); }
    .log.info    { color: var(--text2); }
    .log.ok      { color: var(--green); }
    .log.err     { color: var(--red); }
    .log.blue    { color: var(--blue); }
  </style>
</head>
<body>

  <header>
    <div class="scatter">
      <img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F378.svg" width="22" height="22" alt=""
           style="left:82%;top:20%;animation:bob 3s ease-in-out infinite;animation-delay:0s">
      <img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F3B7.svg" width="18" height="18" alt=""
           style="left:90%;top:65%;animation:bob 3s ease-in-out infinite;animation-delay:0.4s">
      <img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F35E.svg" width="16" height="16" alt=""
           style="left:73%;top:70%;animation:bob 3s ease-in-out infinite;animation-delay:0.8s">
    </div>
    <div class="logo-disc">
      <img src="https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg/1F990.svg" width="28" height="28" alt="">
    </div>
    <div class="header-text">
      <span class="app-name">NOLA AI</span>
      <span class="app-sub">your hungry friend in New Orleans</span>
    </div>
  </header>

  <div class="body">

    <div class="chat">
      <div id="messages">
        <div class="welcome">
          <div class="welcome-icons" id="welcome-icons"></div>
          <div class="welcome-headline">Hungry in New Orleans?</div>
          <div class="welcome-sub">
            Ask me about jazz brunches, late-night Cajun, beignets that beat the line,
            bachelorette spots, dollar oysters — whatever you're craving.
          </div>
        </div>
      </div>

      <div class="input-bar">
        <div class="input-row">
          <div class="input-wrap">
            <textarea id="input" rows="2" maxlength="2000"
              placeholder="jazz brunch for a bachelorette party..."></textarea>
            <div class="char-row">
              <span class="char-count"><span id="char-n">0</span> / 2000</span>
            </div>
          </div>
          <button id="send-btn" disabled>Send</button>
        </div>
      </div>
    </div>

    <div class="console-panel">
      <div class="console-title">
        <div class="console-dot" id="console-dot"></div>
        <span class="console-title-text">what I'm doing</span>
      </div>
      <div id="console">
        <div class="log dim">
          <span class="bullet">·</span><span class="msg">ask me anything...</span>
        </div>
      </div>
    </div>

  </div>

  <script>
    const OPENMOJI = "https://cdn.jsdelivr.net/npm/openmoji@15.1.0/color/svg";
    const emojiUrl = hex => `${OPENMOJI}/${hex}.svg`;

    // ── Welcome emoji row ────────────────────────────────────────────────
    const WELCOME_EMOJIS = [
      ["1F990", 0,    -8],
      ["1F369", 0.18, -4],
      ["1F378", 0.36,  0],
      ["1F3B7", 0.54,  4],
      ["1F35B", 0.72,  8],
    ];
    const welcomeIconsEl = document.getElementById('welcome-icons');
    WELCOME_EMOJIS.forEach(([hex, delay, rot]) => {
      const img = document.createElement('img');
      img.src = emojiUrl(hex);
      img.width = 38; img.height = 38; img.alt = '';
      img.style.cssText = `animation:bob 3s ease-in-out infinite;animation-delay:${delay}s;transform:rotate(${rot}deg)`;
      welcomeIconsEl.appendChild(img);
    });

    // ── Console bullet helpers (deterministic from text seed) ───────────
    const HAND_BULLETS = ['✷', '✿', '❀', '❂', '✳', '✱'];
    function seedHash(s) {
      let h = 0;
      s = String(s || 'x');
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return h;
    }
    function pickBullet(text)  { return HAND_BULLETS[Math.abs(seedHash(text + 'b')) % HAND_BULLETS.length]; }
    function rowIndent(text)   { return ((((seedHash(text + 'i') % 1000) + 1000) % 1000) / 1000) * 2; }

    // ── DOM refs ─────────────────────────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const consoleEl   = document.getElementById('console');
    const consoleDot  = document.getElementById('console-dot');
    const inputEl     = document.getElementById('input');
    const sendBtn     = document.getElementById('send-btn');
    const charNEl     = document.getElementById('char-n');

    let t0             = 0;
    let busy           = false;
    let bubbleInner    = null;
    let avatarEl       = null;
    let countdownEl    = null;
    let countdownTimer = null;
    let tokens         = '';
    let firstToken     = true;
    let currentWrap    = null;

    // ── Input ────────────────────────────────────────────────────────────
    inputEl.addEventListener('input', updateState);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
    });
    sendBtn.addEventListener('click', send);

    function updateState() {
      const n = inputEl.value.length;
      charNEl.textContent = n;
      charNEl.parentElement.classList.toggle('warn', n > 1800);
      sendBtn.disabled = busy || inputEl.value.trim() === '' || n > 2000;
    }

    // ── Markdown (escapes first, then applies patterns — safe against injection) ──
    function renderMd(raw) {
      const e = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<p>' + e
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
        .replace(/\n\n+/g,'</p><p>')
        .replace(/\n/g,'<br>') + '</p>';
    }

    function elapsed() { return ((Date.now() - t0) / 1000).toFixed(1) + 's'; }

    // ── Messages ─────────────────────────────────────────────────────────
    function hideWelcome() {
      const w = messagesEl.querySelector('.welcome');
      if (w) w.remove();
    }

    function addUser(text) {
      hideWelcome();
      const wrap = mkEl('div', 'msg-wrap');
      const row  = mkEl('div', 'msg-row user');
      const b    = mkEl('div', 'bubble user');
      b.textContent = text;
      row.appendChild(b); wrap.appendChild(row);
      messagesEl.appendChild(wrap); scroll();
    }

    function startAssistant() {
      tokens = ''; firstToken = true;

      const wrap   = mkEl('div', 'msg-wrap');
      const row    = mkEl('div', 'msg-row assistant');

      const avatar = mkEl('div', 'avatar streaming');
      const sImg   = document.createElement('img');
      sImg.src = emojiUrl('1F990'); sImg.width = 20; sImg.height = 20; sImg.alt = '';
      avatar.appendChild(sImg);
      avatarEl = avatar;

      const bubble = mkEl('div', 'bubble assistant');
      const inner  = mkEl('div', 'answer-text');
      const cursor = mkEl('span', 'cursor');
      inner.appendChild(cursor);
      bubble.appendChild(inner);
      bubbleInner = inner;

      row.appendChild(avatar); row.appendChild(bubble);
      wrap.appendChild(row);

      const cd = mkEl('div', 'countdown');
      wrap.appendChild(cd);
      countdownEl = cd;
      currentWrap = wrap;

      messagesEl.appendChild(wrap); scroll();
    }

    function startCountdown() {
      const tStart     = Date.now();
      const ESTIMATE   = 2500;
      countdownEl.classList.add('visible');
      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        if (!countdownEl) return;
        const rem = ESTIMATE - (Date.now() - tStart);
        countdownEl.textContent = rem <= 0
          ? 'answer coming any moment...'
          : 'expect an answer in ~' + (rem / 1000).toFixed(1) + 's';
      }, 80);
    }

    function appendToken(t) {
      if (firstToken) {
        firstToken = false;
        clearInterval(countdownTimer);
        if (countdownEl) { countdownEl.classList.remove('visible'); countdownEl.textContent = ''; }
      }
      tokens += t;
      if (bubbleInner) { bubbleInner.innerHTML = renderMd(tokens); scroll(); }
    }

    function finishAssistant() {
      clearInterval(countdownTimer);
      if (countdownEl)  { countdownEl.classList.remove('visible'); }
      if (avatarEl)     { avatarEl.classList.remove('streaming'); }
      if (bubbleInner)  { bubbleInner.innerHTML = renderMd(tokens); }
    }

    function renderCards(businesses) {
      if (!businesses || !businesses.length) return;
      const cards = mkEl('div', 'cards');
      for (const b of businesses) {
        const price   = b.price_range ? '$'.repeat(b.price_range) : '—';
        const snippet = b.evidence?.[0]
          ? b.evidence[0].slice(0, 140) + (b.evidence[0].length > 140 ? '...' : '')
          : '';

        const card      = mkEl('div', 'card');
        const iconDiv   = mkEl('div', 'card-icon');
        const iconImg   = document.createElement('img');
        iconImg.src = emojiUrl('1F990'); iconImg.width = 26; iconImg.height = 26; iconImg.alt = '';
        iconDiv.appendChild(iconImg);

        const body       = mkEl('div', 'card-body');
        const headerRow  = mkEl('div', 'card-header-row');
        const nameEl     = mkEl('span', 'card-name');  nameEl.textContent = b.name;
        const priceEl    = mkEl('span', 'card-price'); priceEl.textContent = price;
        headerRow.appendChild(nameEl); headerRow.appendChild(priceEl);

        const starsEl = mkEl('div', 'card-stars');
        starsEl.textContent = b.stars.toFixed(1) + ' \u2605';
        body.appendChild(headerRow); body.appendChild(starsEl);

        if (snippet) {
          const quoteEl = mkEl('div', 'card-quote');
          quoteEl.textContent = '\u201c' + snippet + '\u201d';
          body.appendChild(quoteEl);
        }

        card.appendChild(iconDiv); card.appendChild(body);
        cards.appendChild(card);
      }
      // attach inside the current assistant wrap so it stays with the message
      if (currentWrap) currentWrap.appendChild(cards);
      else messagesEl.appendChild(cards);
      scroll();
    }

    function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    // ── Console ──────────────────────────────────────────────────────────
    function clearConsole() {
      consoleEl.innerHTML = '';
      consoleDot.classList.remove('active');
    }

    function log(text, cls, withTs) {
      consoleDot.classList.add('active');
      const row = mkEl('div', 'log ' + (cls || 'info'));
      row.style.transform = `translateX(${rowIndent(text).toFixed(1)}px)`;

      const bullet = mkEl('span', 'bullet'); bullet.textContent = pickBullet(text);
      const msg    = mkEl('span', 'msg');    msg.textContent = text;
      row.appendChild(bullet); row.appendChild(msg);

      if (withTs) {
        const ts = mkEl('span', 'ts'); ts.textContent = elapsed();
        row.appendChild(ts);
      }
      consoleEl.appendChild(row);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // ── SSE event handler ─────────────────────────────────────────────────
    function handleEvent(name, data) {
      if (name === 'planning') {
        const n = Object.keys(data.sql_filters || {}).length;
        log('Intent: ' + data.intent, 'blue', true);
        if (n) log(n + ' SQL filter' + (n !== 1 ? 's' : ''), 'info', false);
        if (data.semantic_query) log(data.semantic_query, 'dim', false);

      } else if (name === 'candidates') {
        log('Found ' + data.count + ' business' + (data.count !== 1 ? 'es' : ''), 'ok', true);
        for (const n of (data.businesses || []).slice(0, 5)) log(n, 'dim', false);
        log('Generating...', 'info', false);
        startCountdown();

      } else if (name === 'token') {
        appendToken(data.text);

      } else if (name === 'done') {
        log('Done', 'ok', true);
        renderCards(data.businesses);
        finishAssistant();

      } else if (name === 'error') {
        clearInterval(countdownTimer);
        if (countdownEl)  { countdownEl.classList.remove('visible'); }
        if (avatarEl)     { avatarEl.classList.remove('streaming'); }
        log(data.message || 'Unknown error', 'err', true);
        if (bubbleInner)  {
          bubbleInner.innerHTML = '<span style="color:var(--red)">' + esc(data.message || 'Error') + '</span>';
        }
      }
    }

    // ── Send ──────────────────────────────────────────────────────────────
    async function send() {
      const q = inputEl.value.trim();
      if (!q || busy) return;
      busy = true; t0 = Date.now();

      sendBtn.disabled = true;
      inputEl.value = ''; charNEl.textContent = '0';
      charNEl.parentElement.classList.remove('warn');
      clearConsole(); addUser(q); startAssistant();

      try {
        const resp = await fetch('/api/v1/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        if (!resp.ok) {
          log('HTTP ' + resp.status, 'err', true);
          if (bubbleInner) bubbleInner.innerHTML = '<span style="color:var(--red)">Request failed.</span>';
          return;
        }

        const reader = resp.body.getReader();
        const dec    = new TextDecoder();
        let buf      = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const blocks = buf.split('\n\n');
          buf = blocks.pop();
          for (const block of blocks) {
            if (!block.trim()) continue;
            let evName = 'message', dataStr = null;
            for (const line of block.split('\n')) {
              if (line.startsWith('event: '))     evName  = line.slice(7).trim();
              else if (line.startsWith('data: ')) dataStr = line.slice(6).trim();
            }
            if (!dataStr) continue;
            let data; try { data = JSON.parse(dataStr); } catch { continue; }
            handleEvent(evName, data);
          }
        }
      } catch (err) {
        clearInterval(countdownTimer);
        if (avatarEl) avatarEl.classList.remove('streaming');
        log(err.message, 'err', true);
        if (bubbleInner) bubbleInner.innerHTML = '<span style="color:var(--red)">Connection error.</span>';
      } finally {
        busy = false;
        sendBtn.disabled = false;
        updateState();
        inputEl.focus();
      }
    }

    // ── Utils ─────────────────────────────────────────────────────────────
    function mkEl(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
