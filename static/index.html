<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOLA AI — New Orleans Restaurant Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1C1917;
      --bg2:         #292524;
      --bg3:         #1C1917;
      --border:      #44403C;
      --border2:     #57534E;
      --text:        #FAFAF9;
      --text2:       #A8A29E;
      --text3:       #78716C;
      --accent:      #F59E0B;
      --accent-dim:  rgba(245,158,11,0.15);
      --accent-bdr:  rgba(245,158,11,0.35);
      --accent-glow: rgba(245,158,11,0.08);
      --user-bg:     rgba(245,158,11,0.1);
      --user-bdr:    rgba(245,158,11,0.25);
      --red:         #F87171;
      --green:       #34D399;
      --blue:        #93C5FD;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; }
    body { display: flex; flex-direction: column; }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; flex-shrink: 0;
      background: linear-gradient(135deg, #292524 0%, #1C1917 100%);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #1C1917;
      box-shadow: 0 0 12px rgba(245,158,11,0.3);
    }
    .header-text { display: flex; flex-direction: column; gap: 1px; }
    .app-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
    .app-sub  { font-size: 11px; color: var(--text3); letter-spacing: 0.02em; }

    /* ── Body ───────────────────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Chat panel ─────────────────────────────────────────── */
    .chat { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    #messages {
      flex: 1; overflow-y: auto; padding: 28px 28px 16px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .welcome {
      color: var(--text3); text-align: center; padding: 56px 24px;
      line-height: 1.8; font-size: 13px; max-width: 420px; margin: 0 auto;
    }
    .welcome strong { color: var(--text2); font-weight: 500; }

    /* Message rows */
    .msg-row { display: flex; align-items: flex-start; gap: 10px; }
    .msg-row.user     { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    /* Assistant avatar */
    .avatar {
      width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; margin-top: 2px;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #1C1917;
    }

    /* Bubbles */
    .bubble {
      max-width: 580px; padding: 12px 16px; line-height: 1.65;
      border-radius: 16px; font-size: 14px;
    }
    .bubble.user {
      background: var(--user-bg); border: 1px solid var(--user-bdr);
      border-top-right-radius: 4px; color: var(--text);
    }
    .bubble.assistant {
      background: var(--bg2); border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* Markdown in answer */
    .answer-text p         { margin: 5px 0; }
    .answer-text p:first-child { margin-top: 0; }
    .answer-text p:last-child  { margin-bottom: 0; }
    .answer-text strong    { font-weight: 600; color: var(--text); }
    .answer-text em        { font-style: italic; color: var(--text2); }
    .answer-text ul, .answer-text ol { padding-left: 20px; margin: 5px 0; }
    .answer-text li        { margin: 3px 0; }

    /* Blinking cursor */
    .cursor { display: inline-block; width: 2px; height: 14px; background: var(--accent); vertical-align: middle; margin-left: 2px; animation: blink 0.9s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* TTFT badge under the bubble */
    .ttft-badge {
      font-size: 11px; color: var(--text3); margin-top: 4px; padding-left: 36px;
      display: flex; align-items: center; gap: 6px;
    }
    .ttft-badge .chip {
      background: var(--accent-dim); border: 1px solid var(--accent-bdr);
      color: var(--accent); font-size: 10px; padding: 1px 7px; border-radius: 99px;
      font-weight: 600; letter-spacing: 0.02em;
    }

    /* Countdown shown below the blinking cursor */
    .countdown {
      font-size: 12px; color: var(--text3); margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    /* Business cards */
    .cards { display: flex; flex-direction: column; gap: 8px; max-width: 580px; padding-left: 36px; }
    .card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--border2); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .card-name   { font-weight: 600; font-size: 13px; }
    .card-price  { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; }
    .card-stars  { font-size: 11px; color: #FBBF24; margin-bottom: 6px; }
    .card-quote  { font-size: 12px; color: var(--text3); font-style: italic; line-height: 1.55; }

    /* ── Input bar ──────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--border); padding: 16px 24px;
      background: rgba(41,37,36,0.5); flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 720px; }
    .input-wrap { flex: 1; position: relative; }
    textarea {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 16px; color: var(--text);
      font-family: inherit; font-size: 14px; resize: none; outline: none;
      line-height: 1.5; transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea::placeholder { color: var(--text3); }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow), 0 0 12px var(--accent-glow);
    }
    .char-row { display: flex; justify-content: flex-end; margin-top: 4px; }
    .char-count { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }
    .char-count.warn { color: var(--red); }

    #send-btn {
      padding: 11px 22px; background: var(--accent); color: #1C1917;
      border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; flex-shrink: 0; margin-bottom: 22px;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(245,158,11,0);
    }
    #send-btn:hover:not(:disabled) {
      background: #FBBF24;
      box-shadow: 0 0 16px rgba(245,158,11,0.3);
    }
    #send-btn:disabled { background: #44403C; color: var(--text3); cursor: not-allowed; box-shadow: none; }

    /* ── System Console ─────────────────────────────────────── */
    .console-panel {
      width: 268px; flex-shrink: 0; border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: rgba(28,25,23,0.6);
    }
    .console-title {
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .console-title-text {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em;
    }
    .console-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0;
    }
    #console {
      flex: 1; overflow-y: auto; padding: 14px 14px;
      display: flex; flex-direction: column; gap: 5px;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px; line-height: 1.55;
    }
    .log { display: flex; gap: 7px; align-items: flex-start; }
    .log .icon { flex-shrink: 0; width: 14px; text-align: center; }
    .log .msg  { flex: 1; word-break: break-word; }
    .log .ts   { flex-shrink: 0; color: var(--text3); font-size: 10px; padding-top: 1px; }
    .log.dim   { color: var(--text3); }
    .log.info  { color: var(--text2); }
    .log.ok    { color: var(--green); }
    .log.err   { color: var(--red); }
    .log.blue  { color: var(--blue); }
    .log.amber { color: var(--accent); }

    /* Scrollbars */
    #messages::-webkit-scrollbar,
    #console::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track,
    #console::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb,
    #console::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">N</div>
    <div class="header-text">
      <span class="app-name">NOLA AI</span>
      <span class="app-sub">New Orleans Restaurant Assistant</span>
    </div>
  </header>

  <div class="body">

    <!-- Chat -->
    <div class="chat">
      <div id="messages">
        <div class="welcome">
          Ask about New Orleans restaurants —<br>
          <strong>jazz brunches</strong>, late-night Cajun, bachelorette spots, outdoor patios...
        </div>
      </div>
      <div class="input-bar">
        <div class="input-row">
          <div class="input-wrap">
            <textarea id="input" rows="2" maxlength="2000"
              placeholder="jazz brunch for a bachelorette party..."></textarea>
            <div class="char-row">
              <span class="char-count"><span id="char-n">0</span> / 2000</span>
            </div>
          </div>
          <button id="send-btn" disabled>Send</button>
        </div>
      </div>
    </div>

    <!-- Console -->
    <div class="console-panel">
      <div class="console-title">
        <div class="console-dot"></div>
        <span class="console-title-text">System Console</span>
      </div>
      <div id="console">
        <div class="log dim"><span class="icon">·</span><span class="msg">Waiting for query</span></div>
      </div>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const consoleEl  = document.getElementById('console');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const charNEl    = document.getElementById('char-n');

    // Timing
    let t0 = 0;           // request start (ms)
    let tCandidates = 0;  // when candidates event fired
    let tFirstToken = 0;  // when first token arrived
    let tokenCount = 0;

    // DOM refs for live-updated elements
    let bubbleInner    = null;  // div.answer-text inside assistant bubble
    let countdownEl    = null;  // "First word in ~Xs" element
    let ttftBadgeEl    = null;  // badge row below the bubble
    let countdownTimer = null;

    let tokens = '';
    let firstToken = true;

    // ── Input ──────────────────────────────────────────────────────────
    inputEl.addEventListener('input', updateState);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
    });
    sendBtn.addEventListener('click', send);

    function updateState() {
      const n = inputEl.value.length;
      charNEl.textContent = n;
      const charEl = charNEl.parentElement;
      charEl.classList.toggle('warn', n > 1800);
      sendBtn.disabled = inputEl.value.trim() === '' || n > 2000;
    }

    // ── Simple markdown ────────────────────────────────────────────────
    // Escapes HTML, then applies **bold**, *em*, newlines. Safe: content is
    // escaped before any pattern is applied, so injected tags are inert.
    function renderMd(raw) {
      const e = raw
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const h = e
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
        .replace(/\n\n+/g,'</p><p>')
        .replace(/\n/g,'<br>');
      return '<p>' + h + '</p>';
    }

    // ── Elapsed helper ─────────────────────────────────────────────────
    function elapsed() {
      return ((Date.now() - t0) / 1000).toFixed(1) + 's';
    }

    // ── Messages ───────────────────────────────────────────────────────
    function addUser(text) {
      const row = el('div', 'msg-row user');
      const b   = el('div', 'bubble user');
      b.textContent = text;
      row.appendChild(b); messagesEl.appendChild(row); scroll();
    }

    function startAssistant() {
      tokens = ''; firstToken = true; tokenCount = 0;

      const row    = el('div', 'msg-row assistant');
      const avatar = el('div', 'avatar'); avatar.textContent = 'N';
      const b      = el('div', 'bubble assistant');
      const inner  = el('div', 'answer-text');
      const cursor = el('span', 'cursor');
      inner.appendChild(cursor);
      b.appendChild(inner); row.appendChild(avatar); row.appendChild(b);
      messagesEl.appendChild(row);
      bubbleInner = inner;

      // Countdown below the bubble row
      const badge = el('div', 'ttft-badge');
      const cd    = el('span', 'countdown'); cd.textContent = '';
      badge.appendChild(cd);
      messagesEl.appendChild(badge);
      countdownEl  = cd;
      ttftBadgeEl  = badge;

      scroll();
    }

    function startCountdown() {
      tCandidates = Date.now();
      const ESTIMATE_MS = 2500; // warm synthesis ~2.5s based on experiments

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        const rem = ESTIMATE_MS - (Date.now() - tCandidates);
        if (rem <= 0) {
          if (countdownEl) countdownEl.textContent = 'First word any moment…';
          return;
        }
        if (countdownEl) countdownEl.textContent = 'First word in ~' + (rem / 1000).toFixed(1) + 's';
      }, 80);
    }

    function appendToken(t) {
      if (firstToken) {
        tFirstToken = Date.now();
        firstToken  = false;
        clearInterval(countdownTimer);
        if (countdownEl) countdownEl.textContent = '';

        // Show TTFT badge
        const ttft = ((tFirstToken - t0) / 1000).toFixed(2);
        const chip = el('span', 'chip'); chip.textContent = 'TTFT ' + ttft + 's';
        const label = document.createTextNode('time to first token');
        ttftBadgeEl.innerHTML = '';
        ttftBadgeEl.appendChild(chip);
        ttftBadgeEl.appendChild(label);
      }

      tokens += t;
      tokenCount++;
      if (bubbleInner) {
        bubbleInner.innerHTML = renderMd(tokens);
        scroll();
      }
    }

    function finishAssistant(totalMs) {
      clearInterval(countdownTimer);
      if (countdownEl) countdownEl.textContent = '';
      // Append duration chip to ttft badge
      if (ttftBadgeEl) {
        const chip2 = el('span', 'chip');
        chip2.style.background = 'rgba(52,211,153,0.12)';
        chip2.style.borderColor = 'rgba(52,211,153,0.3)';
        chip2.style.color = 'var(--green)';
        chip2.textContent = 'total ' + (totalMs / 1000).toFixed(1) + 's';
        const sep = document.createTextNode(' · ');
        ttftBadgeEl.appendChild(sep);
        ttftBadgeEl.appendChild(chip2);
      }
    }

    function renderCards(businesses) {
      if (!businesses || !businesses.length) return;
      const cards = el('div', 'cards');
      for (const b of businesses) {
        const price   = b.price_range ? '$'.repeat(b.price_range) : '—';
        const snippet = b.evidence && b.evidence[0]
          ? b.evidence[0].slice(0, 130) + (b.evidence[0].length > 130 ? '…' : '')
          : '';
        const card = el('div', 'card');
        card.innerHTML =
          '<div class="card-header">' +
            '<span class="card-name">'  + esc(b.name) + '</span>' +
            '<span class="card-price">' + esc(price) + '</span>' +
          '</div>' +
          '<div class="card-stars">' + esc(b.stars.toFixed(1)) + ' ★</div>' +
          (snippet ? '<div class="card-quote">"' + esc(snippet) + '"</div>' : '');
        cards.appendChild(card);
      }
      messagesEl.appendChild(cards); scroll();
    }

    function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    // ── Console ────────────────────────────────────────────────────────
    function clearConsole() { consoleEl.innerHTML = ''; }

    function log(icon, text, cls, withTs) {
      const row  = el('div', 'log ' + (cls || 'info'));
      const ico  = el('span', 'icon'); ico.textContent = icon;
      const msg  = el('span', 'msg');  msg.textContent = text;
      row.appendChild(ico); row.appendChild(msg);
      if (withTs) {
        const ts = el('span', 'ts'); ts.textContent = elapsed();
        row.appendChild(ts);
      }
      consoleEl.appendChild(row);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // ── SSE events ─────────────────────────────────────────────────────
    function handleEvent(name, data) {
      if (name === 'planning') {
        const n = Object.keys(data.sql_filters || {}).length;
        log('→', 'Intent: ' + data.intent, 'blue', true);
        if (n) log('⊞', n + ' SQL filter' + (n > 1 ? 's' : ''), 'info', false);
        if (data.semantic_query) log('↳', data.semantic_query, 'dim', false);

      } else if (name === 'candidates') {
        log('✓', 'Found ' + data.count + ' business' + (data.count !== 1 ? 'es' : ''), 'ok', true);
        for (const n of (data.businesses || []).slice(0, 5)) log('·', n, 'dim', false);
        log('⟳', 'Generating…', 'info', false);
        startCountdown();

      } else if (name === 'token') {
        appendToken(data.text);

      } else if (name === 'done') {
        const total = Date.now() - t0;
        const tps   = tokenCount > 0 ? (tokenCount / ((total - (tFirstToken - t0)) / 1000)).toFixed(0) : '—';
        log('✓', 'Done · ' + tokenCount + ' tokens · ' + tps + ' tok/s', 'ok', true);
        renderCards(data.businesses);
        finishAssistant(total);

      } else if (name === 'error') {
        log('✗', data.message, 'err', true);
        clearInterval(countdownTimer);
        if (bubbleInner) bubbleInner.innerHTML = '<span style="color:var(--red)">' + esc(data.message) + '</span>';
        if (countdownEl) countdownEl.textContent = '';
      }
    }

    // ── Send ───────────────────────────────────────────────────────────
    async function send() {
      const q = inputEl.value.trim();
      if (!q) return;
      t0 = Date.now();

      sendBtn.disabled = true;
      inputEl.value = ''; charNEl.textContent = '0';
      clearConsole(); addUser(q); startAssistant();

      try {
        const resp = await fetch('/api/v1/query/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        if (!resp.ok) {
          log('✗', 'HTTP ' + resp.status, 'err', true);
          if (bubbleInner) bubbleInner.innerHTML = '<span style="color:var(--red)">Request failed.</span>';
          return;
        }

        const reader = resp.body.getReader();
        const dec    = new TextDecoder();
        let buf      = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const blocks = buf.split('\n\n');
          buf = blocks.pop();
          for (const block of blocks) {
            if (!block.trim()) continue;
            let evName = 'message', dataStr = null;
            for (const line of block.split('\n')) {
              if (line.startsWith('event: ')) evName = line.slice(7).trim();
              else if (line.startsWith('data: '))  dataStr = line.slice(6).trim();
            }
            if (!dataStr) continue;
            let data; try { data = JSON.parse(dataStr); } catch { continue; }
            handleEvent(evName, data);
          }
        }
      } catch (err) {
        log('✗', err.message, 'err', true);
        if (bubbleInner) bubbleInner.innerHTML = '<span style="color:var(--red)">Connection error.</span>';
        clearInterval(countdownTimer);
      } finally {
        sendBtn.disabled = false; updateState(); inputEl.focus();
      }
    }

    // ── Utils ──────────────────────────────────────────────────────────
    function el(tag, cls) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      return e;
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
